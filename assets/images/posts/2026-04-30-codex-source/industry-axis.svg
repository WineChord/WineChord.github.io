<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="Coding agent runtime evolution axis">
  <defs>
    <style>
      .bg{fill:#fff}.axis{stroke:#57606a;stroke-width:2;marker-end:url(#arrow)}.tick{stroke:#57606a;stroke-width:1.5}
      .box{fill:#fff;stroke:#d0d7de;stroke-width:1.3;rx:5}.blue{fill:#eef6ff;stroke:#4b84c4}.orange{fill:#fff7ed;stroke:#c27a2c}.green{fill:#effaf4;stroke:#4d9566}
      .h{font:700 16px Arial,sans-serif;fill:#24292f}.t{font:14px Arial,sans-serif;fill:#57606a}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#57606a"/></marker>
  </defs>
  <rect class="bg" width="980" height="420"/>
  <line x1="110" y1="210" x2="870" y2="210" class="axis"/>
  <line x1="180" y1="195" x2="180" y2="225" class="tick"/>
  <line x1="395" y1="195" x2="395" y2="225" class="tick"/>
  <line x1="610" y1="195" x2="610" y2="225" class="tick"/>
  <line x1="815" y1="195" x2="815" y2="225" class="tick"/>
  <rect x="70" y="82" width="210" height="76" class="box blue"/><text x="98" y="120" class="h">Completion / Chat</text><text x="98" y="144" class="t">human runs code</text>
  <rect x="300" y="262" width="210" height="76" class="box orange"/><text x="328" y="300" class="h">ReAct loop</text><text x="328" y="324" class="t">reason + action</text>
  <rect x="530" y="82" width="210" height="76" class="box orange"/><text x="558" y="120" class="h">ACI / tool surface</text><text x="558" y="144" class="t">interface matters</text>
  <rect x="700" y="262" width="220" height="76" class="box green"/><text x="728" y="300" class="h">Agent harness</text><text x="728" y="324" class="t">policy + trace + recovery</text>
</svg>
