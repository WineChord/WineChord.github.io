<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-label="Codex tool execution gates">
  <defs>
    <style>
      .bg{fill:#fff}.title{font:700 21px Arial,sans-serif;fill:#24292f}.t{font:14px Arial,sans-serif;fill:#57606a}
      .h{font:700 16px Arial,sans-serif;fill:#24292f}.mono{font:13px Consolas,monospace;fill:#57606a}
      .box{fill:#fff;stroke:#d0d7de;stroke-width:1.3;rx:5}.gate{fill:#fff7ed;stroke:#c27a2c;stroke-width:1.4;rx:5}
      .ok{fill:#effaf4;stroke:#4d9566;stroke-width:1.4;rx:5}.arrow{stroke:#57606a;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#57606a"/></marker>
  </defs>
  <rect class="bg" width="980" height="460"/>
  <rect x="78" y="150" width="140" height="80" class="box"/><text x="102" y="184" class="h">Router</text><text x="102" y="208" class="mono">name + payload</text>
  <rect x="278" y="150" width="140" height="80" class="gate"/><text x="302" y="184" class="h">Parallel gate</text><text x="302" y="208" class="mono">read vs write</text>
  <rect x="478" y="150" width="140" height="80" class="box"/><text x="502" y="184" class="h">Registry</text><text x="502" y="208" class="mono">hooks + mutating</text>
  <rect x="678" y="150" width="140" height="80" class="gate"/><text x="702" y="184" class="h">Approval</text><text x="702" y="208" class="mono">ask / deny / skip</text>

  <rect x="368" y="312" width="140" height="68" class="ok"/><text x="392" y="350" class="h">Sandbox</text>
  <rect x="568" y="312" width="140" height="68" class="box"/><text x="592" y="350" class="h">Observation</text>

  <path d="M218 190H278" class="arrow"/><path d="M418 190H478" class="arrow"/><path d="M618 190H678" class="arrow"/>
  <path d="M748 230C728 284 612 306 508 344" class="arrow"/>
  <path d="M508 346H568" class="arrow"/>
</svg>
