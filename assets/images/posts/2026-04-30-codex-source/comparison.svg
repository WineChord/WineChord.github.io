<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="Codex and Claude Code runtime comparison">
  <defs>
    <style>
      .bg{fill:#fff}.col{fill:#fff;stroke:#d0d7de;stroke-width:1.3;rx:5}.codex{fill:#eef6ff;stroke:#4b84c4}.claude{fill:#fff7ed;stroke:#c27a2c}.open{fill:#effaf4;stroke:#4d9566}
      .h{font:700 16px Arial,sans-serif;fill:#24292f}.t{font:14px Arial,sans-serif;fill:#57606a}.mono{font:13px Consolas,monospace;fill:#57606a}
    </style>
  </defs>
  <rect class="bg" width="980" height="520"/>
  <rect x="54" y="58" width="270" height="380" class="col claude"/>
  <text x="82" y="96" class="h">Claude Code sample</text>
  <text x="82" y="140" class="mono">cli.tsx</text>
  <text x="82" y="184" class="mono">QueryEngine / query()</text>
  <text x="82" y="228" class="mono">ToolUseContext</text>
  <text x="82" y="272" class="mono">tools + UI + permissions</text>
  <text x="82" y="334" class="t">Integrated CLI runtime</text>

  <rect x="356" y="58" width="270" height="380" class="col codex"/>
  <text x="384" y="96" class="h">Codex</text>
  <text x="384" y="140" class="mono">CLI / TUI</text>
  <text x="384" y="184" class="mono">App Server protocol</text>
  <text x="384" y="228" class="mono">core Session / run_turn</text>
  <text x="384" y="272" class="mono">tool router / sandbox</text>
  <text x="384" y="334" class="t">Protocol harness</text>

  <rect x="658" y="58" width="270" height="380" class="col open"/>
  <text x="686" y="96" class="h">OpenClaw</text>
  <text x="686" y="140" class="mono">Gateway WebSocket</text>
  <text x="686" y="184" class="mono">operator / node roles</text>
  <text x="686" y="228" class="mono">sandbox backend</text>
  <text x="686" y="272" class="mono">ACP runtime adapter</text>
  <text x="686" y="334" class="t">Gateway-first control plane</text>
</svg>
