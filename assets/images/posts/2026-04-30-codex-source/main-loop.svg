<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="Codex app-server backed turn path">
  <defs>
    <style>
      .bg{fill:#fff}.frame{fill:#fff;stroke:#d8dee4;stroke-width:1.2;rx:6}
      .lane{fill:#fafbfc;stroke:#d8dee4;stroke-width:1;rx:6}
      .node{fill:#fff;stroke:#8c959f;stroke-width:1.4;rx:5}
      .blue{fill:#eef6ff;stroke:#4b84c4}.amber{fill:#fff7ed;stroke:#c27a2c}
      .green{fill:#effaf4;stroke:#4d9566}.gray{fill:#f6f8fa;stroke:#8c959f}
      .title{font:700 21px Arial,sans-serif;fill:#24292f}.h{font:700 16px Arial,sans-serif;fill:#24292f}
      .t{font:14px Arial,sans-serif;fill:#57606a}.mono{font:13px Consolas,monospace;fill:#57606a}
      .arrow{stroke:#57606a;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
      .return{stroke:#2f6f82;stroke-width:1.8;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow2)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#57606a"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#2f6f82"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="520"/>
  <rect x="24" y="22" width="932" height="476" class="frame"/>

  <rect x="52" y="120" width="238" height="300" class="lane"/>
  <text x="76" y="150" class="h">TUI client</text>
  <rect x="78" y="178" width="186" height="54" class="node"/>
  <text x="96" y="208" class="mono">ChatWidget</text>
  <rect x="78" y="266" width="186" height="54" class="node"/>
  <text x="96" y="296" class="mono">AppCommand::user_turn</text>
  <rect x="78" y="354" width="186" height="42" class="gray"/>
  <text x="96" y="380" class="mono">render EventMsg</text>

  <rect x="370" y="120" width="238" height="300" class="lane"/>
  <text x="394" y="150" class="h">In-process App Server</text>
  <rect x="396" y="178" width="186" height="54" class="blue"/>
  <text x="414" y="208" class="mono">turn/start</text>
  <rect x="396" y="266" width="186" height="54" class="node"/>
  <text x="414" y="296" class="mono">v2 input -> core Op</text>
  <rect x="396" y="354" width="186" height="42" class="gray"/>
  <text x="414" y="380" class="mono">notification/request</text>

  <rect x="688" y="120" width="238" height="300" class="lane"/>
  <text x="712" y="150" class="h">codex-core</text>
  <rect x="714" y="170" width="186" height="44" class="green"/>
  <text x="732" y="198" class="mono">Codex queue pair</text>
  <rect x="714" y="238" width="186" height="44" class="green"/>
  <text x="732" y="266" class="mono">Session</text>
  <rect x="714" y="306" width="186" height="44" class="amber"/>
  <text x="732" y="334" class="mono">RegularTask::run</text>
  <rect x="714" y="374" width="186" height="44" class="amber"/>
  <text x="732" y="402" class="mono">run_turn -> model</text>

  <path d="M264 205H396" class="arrow"/>
  <path d="M582 205H714" class="arrow"/>
  <path d="M807 214V238" class="arrow"/>
  <path d="M807 282V306" class="arrow"/>
  <path d="M807 350V374" class="arrow"/>
  <path d="M714 396C620 450 474 450 396 377" class="return"/>
  <path d="M396 377C332 430 236 430 171 396" class="return"/>
  <path d="M171 232V266" class="arrow"/>
  <path d="M171 320V354" class="return"/>

