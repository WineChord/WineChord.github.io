<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-label="Codex tool routing and sandbox pipeline">
  <defs>
    <style>
      .bg{fill:#fff}.panel{fill:#fff;stroke:#d8dee4;stroke-width:1.2;rx:6}
      .node{fill:#fff;stroke:#8c959f;stroke-width:1.3;rx:5}.blue{fill:#eef6ff;stroke:#4b84c4}
      .orange{fill:#fff7ed;stroke:#c27a2c}.green{fill:#effaf4;stroke:#4d9566}
      .red{fill:#fff1f0;stroke:#cf5555}.title{font:700 21px Arial,sans-serif;fill:#24292f}
      .h{font:700 16px Arial,sans-serif;fill:#24292f}.t{font:14px Arial,sans-serif;fill:#57606a}
      .mono{font:13px Consolas,monospace;fill:#57606a}.arrow{stroke:#57606a;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#57606a;stroke-width:1.5;fill:none;stroke-dasharray:5 5;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#57606a"/></marker>
  </defs>
  <rect class="bg" width="980" height="540"/>
  <rect x="24" y="22" width="932" height="496" class="panel"/>
  <rect x="60" y="142" width="160" height="72" class="node blue"/>
  <text x="82" y="174" class="h">ToolSpec</text>
  <text x="82" y="197" class="mono">model-visible</text>

  <rect x="290" y="142" width="160" height="72" class="node"/>
  <text x="312" y="174" class="h">ToolRouter</text>
  <text x="312" y="197" class="mono">ResponseItem -> ToolCall</text>

  <rect x="520" y="142" width="160" height="72" class="node"/>
  <text x="542" y="174" class="h">ToolRuntime</text>
  <text x="542" y="197" class="mono">cancel + parallel gate</text>

  <rect x="750" y="142" width="160" height="72" class="node green"/>
  <text x="772" y="174" class="h">ToolRegistry</text>
  <text x="772" y="197" class="mono">handler + hooks</text>

  <rect x="176" y="310" width="168" height="72" class="node orange"/>
  <text x="198" y="342" class="h">Approval</text>
  <text x="198" y="365" class="mono">user / policy</text>

  <rect x="406" y="310" width="168" height="72" class="node red"/>
  <text x="428" y="342" class="h">Sandbox</text>
  <text x="428" y="365" class="mono">restricted attempt</text>

  <rect x="636" y="310" width="168" height="72" class="node"/>
  <text x="658" y="342" class="h">Handler</text>
  <text x="658" y="365" class="mono">shell / patch / MCP</text>

  <rect x="406" y="440" width="168" height="44" class="node blue"/>
  <text x="428" y="468" class="mono">ResponseInputItem</text>

  <path d="M220 178H290" class="arrow"/>
  <path d="M450 178H520" class="arrow"/>
  <path d="M680 178H750" class="arrow"/>
  <path d="M830 214C830 270 725 297 720 310" class="arrow"/>
  <path d="M636 346H574" class="arrow"/>
  <path d="M406 346H344" class="arrow"/>
  <path d="M260 382C292 430 354 458 406 462" class="dash"/>
  <path d="M720 382C688 430 626 458 574 462" class="dash"/>

</svg>
