<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="Codex context sources, compaction, and rollout">
  <defs>
    <style>
      .bg{fill:#fff}.box{fill:#fff;stroke:#d0d7de;stroke-width:1.3;rx:5}
      .blue{fill:#eef6ff;stroke:#4b84c4}.orange{fill:#fff7ed;stroke:#c27a2c}.gray{fill:#f6f8fa;stroke:#8c959f}
      .h{font:700 15px Arial,sans-serif;fill:#24292f}.t{font:13px Arial,sans-serif;fill:#57606a}.mono{font:12px Consolas,monospace;fill:#57606a}
      .arrow{stroke:#57606a;stroke-width:1.7;fill:none;marker-end:url(#arrow)}.dash{stroke:#57606a;stroke-width:1.5;fill:none;stroke-dasharray:5 5;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#57606a"/></marker>
  </defs>
  <rect class="bg" width="980" height="520"/>
  <rect x="52" y="70" width="190" height="58" class="box blue"/><text x="72" y="102" class="h">base_instructions</text><text x="72" y="122" class="mono">instructions field</text>
  <rect x="52" y="164" width="190" height="58" class="box orange"/><text x="72" y="196" class="h">AGENTS.md / env</text><text x="72" y="216" class="mono">user fragments</text>
  <rect x="52" y="258" width="190" height="58" class="box blue"/><text x="72" y="290" class="h">skills / plugins / apps</text><text x="72" y="310" class="mono">summaries first</text>
  <rect x="52" y="352" width="190" height="58" class="box blue"/><text x="72" y="384" class="h">memory read</text><text x="72" y="404" class="mono">when enabled</text>

  <rect x="350" y="146" width="210" height="70" class="box"/><text x="372" y="181" class="h">build_initial_context</text><text x="372" y="203" class="t">developer + user sections</text>
  <rect x="350" y="300" width="210" height="70" class="box"/><text x="372" y="335" class="h">reference_context_item</text><text x="372" y="357" class="t">baseline for tracked diff</text>

  <rect x="680" y="72" width="210" height="58" class="box"/><text x="702" y="106" class="h">ContextManager</text>
  <rect x="680" y="178" width="210" height="58" class="box orange"/><text x="702" y="212" class="h">build_prompt</text>
  <rect x="680" y="284" width="210" height="58" class="box gray"/><text x="702" y="318" class="h">CompactedItem</text>
  <rect x="680" y="390" width="210" height="58" class="box gray"/><text x="702" y="424" class="h">Rollout JSONL</text>

  <path d="M242 99C294 99 302 181 350 181" class="arrow"/>
  <path d="M242 193H350" class="arrow"/>
  <path d="M242 287C294 287 302 181 350 181" class="arrow"/>
  <path d="M242 381C294 381 302 181 350 181" class="arrow"/>
  <path d="M455 216V300" class="arrow"/>
  <path d="M560 181C610 181 622 101 680 101" class="arrow"/>
  <path d="M785 130V178" class="arrow"/>
  <path d="M785 236V284" class="arrow"/>
  <path d="M785 342V390" class="arrow"/>
  <path d="M680 419C600 430 590 340 560 335" class="dash"/>
</svg>
