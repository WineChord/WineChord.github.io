<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="Codex multi-agent trace edge example">
  <defs>
    <style>
      .bg{fill:#fff}.thread{fill:#fff;stroke:#d0d7de;stroke-width:1.3;rx:5}.parent{fill:#eef6ff;stroke:#4b84c4;stroke-width:1.3;rx:5}.child{fill:#fff7ed;stroke:#c27a2c;stroke-width:1.3;rx:5}.edge{fill:#f6f8fa;stroke:#8c959f;stroke-width:1.3;rx:5}
      .h{font:700 16px Arial,sans-serif;fill:#24292f}.mono{font:13px Consolas,monospace;fill:#57606a}.arrow{stroke:#57606a;stroke-width:1.7;fill:none;marker-end:url(#arrow)}.dash{stroke:#57606a;stroke-width:1.5;stroke-dasharray:5 5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#57606a"/></marker>
  </defs>
  <rect class="bg" width="980" height="420"/>
  <rect x="70" y="80" width="300" height="220" class="thread"/><text x="100" y="118" class="h">Parent thread</text>
  <rect x="110" y="152" width="220" height="48" class="parent"/><text x="132" y="182" class="mono">spawn_agent(task)</text>
  <rect x="110" y="230" width="220" height="48" class="parent"/><text x="132" y="260" class="mono">observe child result</text>
  <rect x="610" y="80" width="300" height="220" class="thread"/><text x="640" y="118" class="h">Child thread</text>
  <rect x="650" y="152" width="220" height="48" class="child"/><text x="672" y="182" class="mono">own turn + tools</text>
  <rect x="650" y="230" width="220" height="48" class="child"/><text x="672" y="260" class="mono">final message</text>
  <rect x="380" y="332" width="220" height="46" class="edge"/><text x="414" y="361" class="mono">InteractionEdge</text>
  <path d="M330 176H650" class="arrow"/>
  <path d="M650 254H330" class="arrow"/>
  <path d="M220 300C260 340 320 352 380 355" class="dash"/>
  <path d="M760 300C720 340 660 352 600 355" class="dash"/>
</svg>
