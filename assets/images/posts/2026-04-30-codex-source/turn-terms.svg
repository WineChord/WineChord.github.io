<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" role="img" aria-label="Codex turn loop terms">
  <defs>
    <style>
      .bg{fill:#fff}.card{fill:#fff;stroke:#d0d7de;stroke-width:1.3;rx:5}
      .fill{fill:#f6f8fa}.blue{fill:#eef6ff}.orange{fill:#fff7ed}.green{fill:#effaf4}
      .title{font:700 21px Arial,sans-serif;fill:#24292f}.h{font:700 17px Arial,sans-serif;fill:#24292f}
      .t{font:14px Arial,sans-serif;fill:#57606a}.mono{font:13px Consolas,monospace;fill:#57606a}
      .arrow{stroke:#57606a;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#57606a"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="440"/>
  <rect x="58" y="120" width="154" height="92" class="card blue"/>
  <text x="82" y="154" class="h">Thread</text>
  <text x="82" y="181" class="t">conversation line</text>
  <text x="82" y="201" class="mono">thread_id</text>

  <rect x="262" y="120" width="154" height="92" class="card orange"/>
  <text x="286" y="154" class="h">Turn</text>
  <text x="286" y="181" class="t">one user task</text>
  <text x="286" y="201" class="mono">turn/start</text>

  <rect x="466" y="120" width="154" height="92" class="card green"/>
  <text x="490" y="154" class="h">Submission</text>
  <text x="490" y="181" class="t">op into core</text>
  <text x="490" y="201" class="mono">Op::UserInput</text>

  <rect x="670" y="120" width="154" height="92" class="card fill"/>
  <text x="694" y="154" class="h">ResponseItem</text>
  <text x="694" y="181" class="t">model history</text>
  <text x="694" y="201" class="mono">message/tool</text>

  <rect x="394" y="286" width="194" height="92" class="card blue"/>
  <text x="418" y="320" class="h">EventMsg</text>
  <text x="418" y="347" class="t">core output event</text>
  <text x="418" y="367" class="mono">delta/approval/done</text>

  <path d="M212 166H262" class="arrow"/>
  <path d="M416 166H466" class="arrow"/>
  <path d="M620 166H670" class="arrow"/>
  <path d="M747 212C720 268 620 305 588 326" class="arrow"/>
  <path d="M394 326C305 302 205 257 150 212" class="arrow"/>
</svg>
