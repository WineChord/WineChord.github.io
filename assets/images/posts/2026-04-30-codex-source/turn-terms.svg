<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-label="Codex turn loop glossary">
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .title { font: 700 32px Arial, sans-serif; fill: #1f2f2c; }
      .note { font: 20px Arial, sans-serif; fill: #40514d; }
      .card { fill: #ffffff; stroke: #b9c9c4; stroke-width: 2; rx: 14; }
      .head { font: 700 25px Arial, sans-serif; fill: #153b39; }
      .body { font: 20px Arial, sans-serif; fill: #394946; }
      .arrow { stroke: #61706d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .accent { fill: #fff5e3; stroke: #bd7a14; stroke-width: 2; rx: 14; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#61706d"/>
    </marker>
  </defs>
  <rect class="bg" width="1000" height="720"/>
  <text x="54" y="72" class="title">读 Codex 主循环前，先把几个词摆正</text>
  <text x="54" y="112" class="note">这些词不是文档装饰，它们分别对应源码里的状态边界。</text>

  <rect x="70" y="155" width="260" height="128" class="card"/>
  <text x="96" y="198" class="head">Thread</text>
  <text x="96" y="236" class="body">一条会话线</text>
  <text x="96" y="266" class="body">可以被 UI / client 路由</text>

  <rect x="370" y="155" width="260" height="128" class="accent"/>
  <text x="396" y="198" class="head">Turn</text>
  <text x="396" y="236" class="body">一次用户任务</text>
  <text x="396" y="266" class="body">内部可能多次采样</text>

  <rect x="670" y="155" width="260" height="128" class="card"/>
  <text x="696" y="198" class="head">Submission</text>
  <text x="696" y="236" class="body">进入 core 的操作</text>
  <text x="696" y="266" class="body">例如 UserInput</text>

  <rect x="190" y="395" width="260" height="128" class="card"/>
  <text x="216" y="438" class="head">ResponseItem</text>
  <text x="216" y="476" class="body">模型可见历史项</text>
  <text x="216" y="506" class="body">消息、工具调用、结果</text>

  <rect x="550" y="395" width="260" height="128" class="accent"/>
  <text x="576" y="438" class="head">EventMsg</text>
  <text x="576" y="476" class="body">core 对外发事件</text>
  <text x="576" y="506" class="body">delta、approval、complete</text>

  <path d="M330 219 L370 219" class="arrow"/>
  <path d="M630 219 L670 219" class="arrow"/>
  <path d="M800 283 C800 350 720 365 680 395" class="arrow"/>
  <path d="M550 459 L450 459" class="arrow"/>
  <path d="M320 395 C320 340 455 323 500 283" class="arrow"/>

  <text x="92" y="626" class="note">一句话：用户看到的是聊天；源码里跑的是 thread 里的 turn，</text>
  <text x="92" y="662" class="note">turn 又通过 submission / response item / event msg 维护状态。</text>
</svg>
