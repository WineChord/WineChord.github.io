<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="Codex tracked context diff scope">
  <defs>
    <style>
      .bg{fill:#fff}.box{fill:#fff;stroke:#d0d7de;stroke-width:1.3;rx:5}.blue{fill:#eef6ff;stroke:#4b84c4}.warn{fill:#fff7ed;stroke:#c27a2c}
      .h{font:700 16px Arial,sans-serif;fill:#24292f}.t{font:14px Arial,sans-serif;fill:#57606a}.arrow{stroke:#57606a;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#57606a"/></marker>
  </defs>
  <rect class="bg" width="980" height="420"/>
  <rect x="80" y="80" width="270" height="190" class="box"/>
  <text x="110" y="118" class="h">Initial context</text>
  <text x="110" y="154" class="t">AGENTS.md</text><text x="110" y="184" class="t">environment</text><text x="110" y="214" class="t">skills / apps / plugins</text><text x="110" y="244" class="t">memory prompt</text>
  <rect x="630" y="80" width="270" height="190" class="box blue"/>
  <text x="660" y="118" class="h">Tracked settings diff</text>
  <text x="660" y="154" class="t">model switch</text><text x="660" y="184" class="t">permission / approval</text><text x="660" y="214" class="t">realtime / personality</text><text x="660" y="244" class="t">environment update</text>
  <rect x="350" y="308" width="280" height="58" class="box warn"/>
  <text x="380" y="342" class="h">TODO: not a full context diff</text>
  <path d="M350 175H630" class="arrow"/><path d="M490 270V308" class="arrow"/>
</svg>
